<main class="container">

            <h2><span class="star">★</span> Favorites</h2>
        </div>
        <div id="favorites" class="games favorites-grid"></div>
    </section>

    <section id="steam-library">
        <div class="section-heading">
            <h2>Library</h2>
            <p class="section-sub" id="library-count"></p>
        </div>

        <div class="controls">
            <div class="search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                <input id="search" placeholder="Search your library…">
            </div>

            <select id="sort">
                <option value="hours">Most played</option>
                <option value="az">A – Z</option>
                <option value="za">Z – A</option>
            </select>
        </div>

        <div id="games" class="games">
            <div class="loading-state">
                <span class="spinner" aria-hidden="true"></span>
                Loading my library — this can take a few moments if the server's been asleep.
            </div>
        </div>
    </section>
